name: 政策监控日报

on:
  schedule:
    - cron: '0 9 * * *'  # 每天上午9点运行
  workflow_dispatch:      # 允许手动运行

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    env:
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install openai
      
      - name: 生成报告
        run: python main.py
      
      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4  # ← 关键：v3 改成 v4
        with:
          name: policy-reports-${{ github.run_id }}
          path: reports/*.md
          retention-days: 30
